<div class="testimonial-section">
  <div class="testimonial-images">
    <img src="assets/img1.jpg" alt="Customer 1">
    <img src="assets/img2.jpg" alt="Customer 2">
    <img src="assets/img3.jpg" alt="Customer 3">
    <img src="assets/img4.jpg" alt="Customer 4">
  </div>
  
  <div class="testimonial-content">
    <p class="testimonial-title">Testimonial</p>
    <h2>What They Say</h2>
    <p class="testimonial-text">
      Laundry? Nightmare! ProLaundry picks up Tuesdays, back by Friday, clean & folded. Weekends free! Sometimes a bit late, but worth it!
    </p>
    <div class="testimonial-author">
      <img src="assets/customer.jpg" alt="Rahul Singh">
      <span>Rahul Singh</span>
    </div>
  </div>
</div>

<div class="row card-scroll-container"  #cardContainer >

  <div class="col-sm-4 mb-3 mb-sm-0" *ngFor="let card of services">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">{{card.title}}</h5>
        <p class="card-text">{{card.description}}</p>
        <button href="#" class="button">Book Now</button>
      </div>
    </div>
  </div>
  
</div>
