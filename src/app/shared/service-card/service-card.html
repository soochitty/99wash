
<section class="services-section">
    <div class="container">
        <div class="services-header">
            <h2 class="section-title">99 WASH Services</h2>
            <p class="section-subtitle">Premium laundry and dry cleaning with doorstep pickup and delivery across Mumbai & Navi Mumbai.</p>
        </div>

        <div class="services-grid">
            <div class="service-card" *ngFor="let card of services">
                <div class="price-badge">Starts ₹{{card.price}}<span>/{{card.unit}}</span></div>
                <div class="service-icon-wrapper">
                    <img [src]="card.image" alt="{{card.title}}">
                </div>
                <h3>{{card.title}}</h3>
                <p>{{card.description}}</p>
                <div class="card-footer">
                    <a  (click)="bookPickupForm.openPopup()" class="btn-primary">Book Now</a>
                    <a [routerLink]="['/services']" fragment="{{card.link}}" class="btn-link">View Rate List</a>
                </div>
            </div>

            
        </div>
    </div>
</section>
<app-book-pick-up-form></app-book-pick-up-form>
